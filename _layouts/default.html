<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 16px; line-height: 1.6; color: #333; }
      .page-header { background: linear-gradient(120deg, #155799, #159957); padding: 3rem 2rem; text-align: center; color: #fff; }
      .page-header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
      .page-header p { opacity: 0.85; font-size: 1rem; }
      .main-content { max-width: 860px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }
      .main-content h1, .main-content h2, .main-content h3 { margin-top: 2rem; margin-bottom: 0.75rem; color: #159957; }
      .main-content h1 { font-size: 1.75rem; }
      .main-content h2 { font-size: 1.35rem; }
      .main-content p, .main-content ul, .main-content ol { margin-bottom: 1rem; }
      .main-content a { color: #159957; }
      .main-content ul, .main-content ol { padding-left: 1.5rem; }
      .site-footer { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid #e5e5e5; font-size: 0.85rem; color: #888; text-align: center; }
    </style>
  </head>
  <body>
    <header class="page-header">
      <h1>{{ page.title | default: site.title }}</h1>
      <p>{{ site.description }}</p>
    </header>
    <main class="main-content">
      {{ content }}
      <footer class="site-footer">
        YallaFit &mdash; Ajman, United Arab Emirates
      </footer>
    </main>
  </body>
</html>
